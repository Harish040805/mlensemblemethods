<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | ML Ensemble Methods Simulator</title>
    <link rel="icon" href="https://github.com/Harish040805/mlensemblemethods/blob/main/logo.png?raw=true" type="image/png">
    <style>
        :root { --bg-color: #f8fafc; --card-bg: #ffffff; --accent-color: #0284c7; --text-color: #1e293b; --border-color: #e2e8f0; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 600px; }
        .panel { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 40px 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; }
        h1, h2 { color: var(--accent-color); margin: 0 0 15px 0; }
        p { color: #64748b; font-size: 1.1rem; margin-bottom: 30px; line-height: 1.5; }
        .action-btn { background-color: #1e293b; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h1>ML Ensemble Methods Simulator</h1>
            <h2>Welcome to ML Ensemble Methods Simulator</h2>
            <p>Explore interactive visualizations of Ensemble Methods like Bagging and Boosting in machine learning</p>
            <button class="action-btn" id="enter-btn">Enter the site</button>
            <button class="action-btn" id="about-btn">About</button>
            <button class="action-btn" id="instruct-btn">Instructions</button>
        </div>
    </div>
<script>
        document.getElementById('enter-btn').onclick = function() {
            window.location.href = 'startsimulation.html';
        };
        document.getElementById('about-btn').onclick = function() {
            window.location.href = 'about.html';
        };
        document.getElementById('instruct-btn').onclick = function() {
            window.location.href = 'instructions.html';
        };
    </script>
</body>
</html>
